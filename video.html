<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <video width="600px" height="" controls autoplay mute loop src="Video/song Hold me down.mp4"></video>
    <iframe width="600px" height="600px" src="https://www.youtube.com/embed/O8O5znlymVA?si=S4U7aa1466QLj-HA" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <!-- video tagសម្រាប់បង្ហាញវីដេអូ -->
        <!-- iframe សម្រាប់បង្ហាញវដេអូតែមិនបាច់save-->
        <!-- controls សម្រាប់ជួយឪ្យវីដេអូដំណើរការ -->
        <!-- mute សម្រាប់បិទសម្លេង -->
        <!-- autoplay សម្រាប់ឪ្យវីដេអូដំណើរការដោយស្វ័យប្រវត្តិតែត្រូវថែមmuteផង-->
        <!-- loop សម្រាប់ឪ្យវីដេអូដំណើការឡើងវិញ -->
</body>
</html>
