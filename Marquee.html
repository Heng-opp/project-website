<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- marquee សម្រាប់បង្ហាញអត្ថបទដែលមានចលនា -->
    <!-- 
    direction
        -left(default)អក្សរធ្វើចលនាពីស្តាំមកឆ្វេង
        -right(អក្សរធ្វើចលនាពីឆ្វេងមកស្តាំ)
        -up(អក្សរធ្វើចលនាពីក្រោមោឡើងលើ)
        -down(អក្សរធ្វើចលនាពីលើចុះក្រោម)
    behavilor
        -scroll(default)ដើររហូត
        -slide(ដើរអស់ត្រឹមណាឈប់ត្រឹមនិង)
        -alternate(ដើរឡងទៅមក)
        -->
    <marquee behavior="scorll" direction="left" style="color: brown;background-color:aquamarine;">
        <h1>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorum, et!</h1>
    </marquee>
    <marquee behavior="slide" direction="right" style="color: brown;background-color: aquamarine;">
        <h1>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorum, et!</h1>
    </marquee>
    <marquee behavior="alternate" direction="up" style="color: blue;background-color: rgb(40, 98, 149);width: 300px;height: 500px;">
        <h1>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorum, et!</h1>
    </marquee>
    <marquee behavior="" direction="down" style="color:beige;background-color: aqua;width: 300px;height: 500px;" >
        <h1>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorum, et!</h1>
    </marquee>
</body>
</html>
